<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Тур Агенція</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <h1 class="text-center mb-4">🌍 Світ Турів (Випускний Проєкт)</h1>

    <div class="card p-4 mb-4 shadow-sm">
        <h3>Додати новий тур</h3>
        <form action="/web/tour/add" method="POST" class="row g-3">
            <div class="col-md-4">
                <input type="text" name="title" class="form-control" placeholder="Назва туру" required>
            </div>
            <div class="col-md-5">
                <input type="text" name="description" class="form-control" placeholder="Опис туру" required>
            </div>
            <div class="col-md-2">
                <input type="number" name="price" class="form-control" placeholder="Ціна (грн)" required>
            </div>
            <div class="col-md-1">
                <button type="submit" class="btn btn-success w-100">Додати</button>
            </div>
        </form>
    </div>

    <form method="GET" action="/" class="d-flex mb-4">
        <input type="text" name="search" class="form-control me-2" placeholder="Пошук за назвою або описом..." value="{{ search or '' }}">
        <button type="submit" class="btn btn-primary">Шукати</button>
        {% if search %}
            <a href="/" class="btn btn-secondary ms-2">Скинути</a>
        {% endif %}
    </form>

    <h2 class="mb-3">Останні тури (Макс. 20)</h2>
    <div class="row">
        {% for tour in tours %}
        <div class="col-md-4 mb-3">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title">{{ tour.title }}</h5>
                    <p class="card-text text-muted">{{ tour.description[:100] }}...</p>
                    <h6 class="text-primary">{{ tour.price }} грн</h6>
                    <div class="mt-3">
                        <a href="/web/tour/{{ tour.id or tour._id }}" class="btn btn-info btn-sm text-white">Детальніше</a>
                        <a href="/web/web/tour/delete/{{ tour.id or tour._id }}" class="btn btn-danger btn-sm float-end">Видалити</a>
                    </div>
                </div>
            </div>
        </div>
        {% else %}
        <p class="text-muted ps-3">Турів поки немає або нічого не знайдено.</p>
        {% endfor %}
    </div>
</div>

</body>
</html>
