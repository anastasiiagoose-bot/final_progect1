<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>{{ tour.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
    <div class="card p-5 shadow-sm mx-auto" style="max-width: 700px;">
        <h1 class="text-primary">{{ tour.title }}</h1>
        <hr>
        <p class="fs-5"><strong>Опис туру:</strong></p>
        <p class="lead">{{ tour.description }}</p>

        <h4 class="mt-4 text-success">Ціна: {{ tour.price }} грн</h4>
        <hr>
        <a href="/" class="btn btn-secondary">🔙 Назад до списку</a>
    </div>
</div>

</body>
</html>
